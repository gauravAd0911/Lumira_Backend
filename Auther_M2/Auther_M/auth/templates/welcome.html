<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Welcome</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    background: #0f0f13;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* Animated background blobs */
  .blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.18;
    animation: float 8s ease-in-out infinite;
  }
  .blob1 { width: 500px; height: 500px; background: #6c47ff; top: -100px; left: -100px; animation-delay: 0s; }
  .blob2 { width: 400px; height: 400px; background: #ff6b6b; bottom: -80px; right: -80px; animation-delay: 3s; }
  .blob3 { width: 300px; height: 300px; background: #47c3ff; top: 50%; left: 50%; animation-delay: 5s; }

  @keyframes float {
    0%, 100% { transform: translate(0, 0) scale(1); }
    50% { transform: translate(20px, -20px) scale(1.05); }
  }

  .card {
    position: relative;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 24px;
    padding: 3rem 3.5rem;
    width: 100%;
    max-width: 480px;
    backdrop-filter: blur(20px);
    animation: slideUp 0.6s cubic-bezier(0.16,1,0.3,1) both;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(30px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Top bar: avatar + logout */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 2.5rem;
  }

  .avatar {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: linear-gradient(135deg, #6c47ff, #ff6b6b);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    color: #fff;
    font-weight: 600;
  }

  .logout-btn {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
    color: rgba(255,255,255,0.6);
    padding: 0.45rem 1.1rem;
    border-radius: 50px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .logout-btn:hover {
    background: rgba(255,255,255,0.12);
    color: #fff;
    border-color: rgba(255,255,255,0.25);
  }

  /* Main content */
  .tag {
    display: inline-block;
    background: rgba(108,71,255,0.2);
    border: 1px solid rgba(108,71,255,0.4);
    color: #a78bfa;
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.3rem 0.9rem;
    border-radius: 50px;
    margin-bottom: 1.2rem;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2.2rem;
    color: #fff;
    line-height: 1.2;
    margin-bottom: 0.8rem;
  }

  h1 span {
    background: linear-gradient(90deg, #a78bfa, #ff6b6b);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    color: rgba(255,255,255,0.4);
    font-size: 0.95rem;
    line-height: 1.6;
    margin-bottom: 2rem;
  }

  .divider {
    height: 1px;
    background: rgba(255,255,255,0.07);
    margin-bottom: 1.5rem;
  }

  .status {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    color: rgba(255,255,255,0.35);
    font-size: 0.85rem;
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #4ade80;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }
</style>
</head>
<body>

<div class="blob blob1"></div>
<div class="blob blob2"></div>
<div class="blob blob3"></div>

<div class="card">

  <div class="topbar">
    <div class="avatar" id="avatarInitial">A</div>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>

  <div class="tag">✓ Authenticated</div>

  <h1>Welcome back,<br><span id="userName">User</span></h1>

  <p class="subtitle">You have successfully logged in to your account.</p>

  <div class="divider"></div>

  <div class="status">
    <div class="dot"></div>
    Session active
  </div>

</div>

<script>
  const user = JSON.parse(localStorage.getItem("user") || "{}")

  // Get name only — not email
  const fullName = user.full_name || user.name || ""
  const firstName = fullName.split(" ")[0] || "User"

  document.getElementById("userName").innerText = firstName
  document.getElementById("avatarInitial").innerText = firstName.charAt(0).toUpperCase()

  function logout(){
    localStorage.removeItem("access_token")
    localStorage.removeItem("user")
    window.location.href = "/"
  }
</script>

</body>
</html>
