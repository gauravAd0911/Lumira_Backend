<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Authentication</title>
<link rel="stylesheet" href="/static/css/style.css">
<style>
  .pass-wrap { position: relative; display: flex; align-items: center; }
  .pass-wrap input { width: 100%; padding-right: 2.5rem; }
  .eye-btn { position: absolute; right: 0.75rem; background: none; border: none; cursor: pointer; font-size: 1rem; color: #888; padding: 0; }
  .eye-btn:hover { color: #333; }
</style>
</head>

<body>

<div class="auth-box">

  <h2 id="formTitle">Login</h2>

  <div class="msg" id="msgBox"></div>

  <!-- LOGIN FORM -->
  <form id="loginForm">
    <input type="email" id="email" placeholder="Email" required>
    <div class="pass-wrap">
      <input type="password" id="password" placeholder="Password" required>
      <button type="button" class="eye-btn" onclick="togglePass('password', this)">👁</button>
    </div>
    <button type="submit">Login</button>
    <p class="toggle">
      <a href="#" onclick="showForgot(); return false;">Forgot Password?</a>
    </p>
    <p class="toggle">
      Don't have an account? <span onclick="showRegister()">Register</span>
    </p>
  </form>

  <!-- REGISTER FORM -->
  <form id="registerForm" style="display:none">
    <input type="text"  id="name"      placeholder="Full Name"     required>
    <input type="email" id="reg_email" placeholder="Email"         required>
    <input type="text"  id="mobile"    placeholder="Mobile Number" required>
    <div class="pass-wrap">
      <input type="password" id="reg_password" placeholder="Password" required>
      <button type="button" class="eye-btn" onclick="togglePass('reg_password', this)">👁</button>
    </div>
    <button type="submit">Register</button>
    <p class="toggle">
      Already have an account? <span onclick="showLogin()">Login</span>
    </p>
  </form>

  <!-- FORGOT PASSWORD -->
  <form id="forgotForm" style="display:none">
    <input type="email" id="forgot_email" placeholder="Enter Email" required>
    <button type="submit">Send Reset Token</button>
    <p class="toggle">
      <span onclick="showLogin()">Back to Login</span>
    </p>
  </form>

  <!-- RESET PASSWORD -->
  <form id="resetForm" style="display:none">
    <input type="text" id="reset_token" placeholder="Paste reset token from backend console" required>
    <div class="pass-wrap">
      <input type="password" id="new_password" placeholder="Enter new password" required>
      <button type="button" class="eye-btn" onclick="togglePass('new_password', this)">👁</button>
    </div>
    <button type="submit">Reset Password</button>
    <p class="toggle">
      <span onclick="showLogin()">Back to Login</span>
    </p>
  </form>

</div>

<script>
  function togglePass(id, btn) {
    const input = document.getElementById(id)
    if (input.type === "password") {
      input.type = "text"
      btn.innerText = "🙈"
    } else {
      input.type = "password"
      btn.innerText = "👁"
    }
  }
</script>

<script src="/static/js/auth.js"></script>

</body>
</html>
